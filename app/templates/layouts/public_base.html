<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Auth{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/public.css', v='20260311-sidebar-persist') }}">
  <style>
    *, *::before, *::after {
      animation: none !important;
      transition: none !important;
      scroll-behavior: auto !important;
    }
    .tab-content > .tab-pane {
      transition: none !important;
      animation: none !important;
      transform: none !important;
    }
    .nav-tabs .nav-link {
      transition: none !important;
    }
  </style>
  {% block extra_styles %}{% endblock %}

</head>
<body class="public-shell" data-app-timezone="{{ app_timezone or 'UTC' }}">
  <main>
    {% block content %}{% endblock %}
  </main>

  <script src="{{ url_for('static', filename='js/public.js', v='20260311-sidebar-persist') }}"></script>


  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
